<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peso Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body.dark-mode {
      background: #1a1a1c;
      color: #f5f5f7;
    }
    .app { 
      max-width: 500px; 
      margin: 0 auto; 
      padding: 0;
      min-height: 100vh;
    }
    
    .header { 
      text-align: center;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e8e8ea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(248, 249, 250, 0.9);
      backdrop-filter: blur(10px);
      z-index: 40;
    }
    body.dark-mode .header {
      background: rgba(26, 26, 28, 0.95);
      border-bottom-color: #424245;
    }
    
    .header-left {
      flex: 1;
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0;
      letter-spacing: -0.3px;
    }
    body.dark-mode .header-title {
      color: #f5f5f7;
    }
    
    .header-subtitle {
      font-size: 12px;
      color: #8a8a8e;
      margin-top: 2px;
      font-weight: 500;
    }
    
    .header-buttons {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .theme-toggle, .menu-btn {
      background: transparent;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #0071e3;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .theme-toggle:active, .menu-btn:active {
      background: rgba(0, 113, 227, 0.1);
    }
    body.dark-mode .theme-toggle:active, body.dark-mode .menu-btn:active {
      background: rgba(0, 113, 227, 0.2);
    }
    
    .menu-dropdown {
      display: none;
      position: absolute;
      top: 50px;
      right: 12px;
      background: #fff;
      border: 1px solid #e8e8ea;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
      z-index: 100;
      min-width: 200px;
      overflow: hidden;
    }
    body.dark-mode .menu-dropdown {
      background: #2a2a2d;
      border-color: #545456;
    }
    .menu-dropdown.active {
      display: block;
    }
    .menu-dropdown button {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      font-size: 16px;
      color: #0071e3;
      border-bottom: 1px solid #f2f2f4;
      transition: background 0.15s;
    }
    body.dark-mode .menu-dropdown button {
      color: #0a84ff;
      border-bottom-color: #424245;
    }
    .menu-dropdown button:last-child {
      border-bottom: none;
    }
    .menu-dropdown button:active {
      background: rgba(0, 113, 227, 0.1);
    }
    body.dark-mode .menu-dropdown button:active {
      background: rgba(0, 132, 255, 0.15);
    }
    
    .file-input-wrapper input[type="file"] {
      display: none;
    }
    
    .content {
      padding: 14px 16px 24px;
    }
    
    .card { 
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #e8e8ea;
    }
    body.dark-mode .card {
      background: #2a2a2d;
      border: 1px solid #424245;
    }
    
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #8a8a8e;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }
    
    .metric-highlight {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    
    .metrics-big-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .metric-big-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #e8e8ea;
      text-align: center;
    }
    body.dark-mode .metric-big-card {
      background: #2a2a2d;
      border: 1px solid #424245;
    }
    
    .metric-big-label {
      font-size: 11px;
      font-weight: 700;
      color: #8a8a8e;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    
    .metric-big-value {
      font-size: 32px;
      font-weight: 700;
      color: #0071e3;
      font-variant-numeric: tabular-nums;
      margin-bottom: 4px;
    }
    body.dark-mode .metric-big-value {
      color: #0a84ff;
    }
    
    .metric-big-value.up {
      color: #d70015;
    }
    
    .metric-big-value.down {
      color: #34c759;
    }
    
    .metric-big-sub {
      font-size: 11px;
      color: #8a8a8e;
    }
    
    .metric-info-big {
      text-align: right;
    }
    
    .metric-label-big {
      font-size: 13px;
      color: #8a8a8e;
      margin-bottom: 4px;
    }
    
    .metric-date-big {
      font-size: 12px;
      color: #86868b;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .metric-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    body.dark-mode .metric-box {
      background: #3a3a3d;
    }
    
    .metric-box-label {
      font-size: 11px;
      color: #8a8a8e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 600;
    }
    
    .metric-box-value {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      font-variant-numeric: tabular-nums;
    }
    body.dark-mode .metric-box-value {
      color: #f5f5f7;
    }
    
    .metric-box-sub {
      font-size: 10px;
      color: #8a8a8e;
      margin-top: 4px;
    }
    
    .metric-box-value.up { 
      color: #d70015;
      background: rgba(215, 0, 21, 0.15);
      padding: 4px 8px;
      border-radius: 6px;
    }
    body.dark-mode .metric-box-value.up {
      background: rgba(215, 0, 21, 0.25);
    }
    
    .metric-box-value.down { 
      color: #34c759;
      background: rgba(52, 199, 89, 0.15);
      padding: 4px 8px;
      border-radius: 6px;
    }
    body.dark-mode .metric-box-value.down {
      background: rgba(52, 199, 89, 0.25);
    }
    
    .input-section {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    
    .input-section input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #e8e8ea;
      border-radius: 8px;
      font-size: 16px;
      background: #fff;
      color: #1a1a1a;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    body.dark-mode .input-section input {
      background: #3a3a3d;
      color: #f5f5f7;
      border-color: #545456;
    }
    .input-section input::placeholder {
      color: #a1a1a6;
    }
    .input-section input:focus {
      outline: none;
      border-color: #0071e3;
    }
    
    .input-section input[type="number"] {
      flex: 0 0 70px;
    }
    
    .input-section button {
      flex: 0 0 44px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #0071e3;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .input-section button:active {
      transform: scale(0.95);
      opacity: 0.9;
    }
    
    .textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e8e8ea;
      border-radius: 8px;
      font-size: 16px;
      background: #fff;
      color: #1a1a1a;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      transition: border-color 0.2s;
    }
    body.dark-mode .textarea {
      background: #3a3a3d;
      color: #f5f5f7;
      border-color: #545456;
    }
    .textarea::placeholder {
      color: #a1a1a6;
    }
    .textarea:focus {
      outline: none;
      border-color: #0071e3;
    }
    
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid #e8e8ea;
      overflow-x: auto;
    }
    body.dark-mode .tabs {
      border-bottom-color: #3a3a3c;
    }
    
    .tab-btn {
      padding: 10px 12px;
      border: none;
      background: none;
      color: #8a8a8e;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    
    .tab-btn.active {
      color: #0071e3;
      border-bottom-color: #0071e3;
    }
    body.dark-mode .tab-btn.active {
      color: #0a84ff;
      border-bottom-color: #0a84ff;
    }
    
    .tab-btn:active {
      opacity: 0.6;
    }
    
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 240px;
      margin-bottom: 12px;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    
    .pagination button {
      min-width: 36px;
      height: 36px;
      padding: 0 8px;
      border: 1px solid #e8e8ea;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    body.dark-mode .pagination button {
      background: #3a3a3d;
      color: #f5f5f7;
      border-color: #545456;
    }
    
    .pagination button.active {
      background: #0071e3;
      color: white;
      border-color: #0071e3;
    }
    
    .pagination button:active:not(:disabled) {
      transform: scale(0.95);
    }
    
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .pagination span {
      color: #8a8a8e;
      padding: 0 2px;
      font-size: 13px;
    }
    
    .list-item {
      padding: 10px 0;
      border-bottom: 1px solid #f2f2f4;
      font-size: 13px;
    }
    body.dark-mode .list-item {
      border-bottom-color: #424245;
    }
    .list-item:last-child {
      border-bottom: none;
    }
    
    .list-item-primary {
      color: #1a1a1a;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    body.dark-mode .list-item-primary {
      color: #f5f5f7;
    }
    
    .list-item-primary.up {
      color: #d70015;
    }
    
    .list-item-primary.down {
      color: #34c759;
    }
    
    .list-item-primary span.up {
      color: #d70015;
      background: rgba(215, 0, 21, 0.15);
      padding: 2px 6px;
      border-radius: 4px;
    }
    body.dark-mode .list-item-primary span.up {
      background: rgba(215, 0, 21, 0.25);
    }
    
    .list-item-primary span.down {
      color: #34c759;
      background: rgba(52, 199, 89, 0.15);
      padding: 2px 6px;
      border-radius: 4px;
    }
    body.dark-mode .list-item-primary span.down {
      background: rgba(52, 199, 89, 0.25);
    }
    
    .list-item-secondary {
      display: none;
    }
    
    .del-btn {
      background: none;
      border: none;
      color: #d70015;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      font-weight: bold;
      transition: color 0.2s;
    }
    .del-btn:active {
      color: #ff3b30;
    }
    
    .day-note {
      color: #8a8a8e;
      font-size: 12px;
      margin-top: 4px;
      padding: 4px 0;
      padding-left: 8px;
      border-left: 2px solid #0071e3;
      font-style: italic;
    }
    body.dark-mode .day-note {
      border-left-color: #0a84ff;
    }
    
    .week-title {
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid #f2f2f4;
    }
    body.dark-mode .week-title {
      color: #f5f5f7;
      border-bottom-color: #424245;
    }
    
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 500;
    }
    
    .alert.success {
      background: #d1f4e0;
      color: #1b3f2b;
    }
    body.dark-mode .alert.success {
      background: rgba(52, 199, 89, 0.2);
      color: #66bb6a;
    }
    
    .alert.error {
      background: #f8d7da;
      color: #5a1a1f;
    }
    body.dark-mode .alert.error {
      background: rgba(215, 0, 21, 0.2);
      color: #ff453a;
    }
    
    .alert.warning {
      background: #fff3cd;
      color: #664d03;
    }
    body.dark-mode .alert.warning {
      background: rgba(255, 204, 0, 0.2);
      color: #ffd60a;
    }
    
    .empty {
      text-align: center;
      padding: 24px 16px;
      color: #8a8a8e;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h1 class="header-title">Peso</h1>
      <p class="header-subtitle">Seguimiento semanal</p>
    </div>
    <div class="header-buttons">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">◐</span>
      </button>
      <button class="menu-btn" onclick="toggleMenu()">⋯</button>
      <div class="menu-dropdown" id="menu">
        <div class="file-input-wrapper">
          <button onclick="document.getElementById('csvFile').click(); closeMenu();">
            Importar CSV
          </button>
          <input type="file" id="csvFile" accept=".csv" onchange="importCSV()" />
        </div>
        <button onclick="exportCSV(); closeMenu();">Exportar CSV</button>
        <button onclick="confirmarLimpiarDatos(); closeMenu();">Limpiar datos</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="alerts"></div>

    <!-- Métricas grandes destacadas -->
    <div class="metrics-big-grid">
      <div class="metric-big-card">
        <div class="metric-big-label">Media semanal</div>
        <div class="metric-big-value" id="bigM1">—</div>
        <div class="metric-big-sub" id="bigM1sub"></div>
      </div>
      <div class="metric-big-card">
        <div class="metric-big-label">Último</div>
        <div class="metric-big-value" id="bigM2">—</div>
        <div class="metric-big-sub" id="bigM2sub"></div>
      </div>
      <div class="metric-big-card">
        <div class="metric-big-label">Mínimo</div>
        <div class="metric-big-value" id="bigM3">—</div>
        <div class="metric-big-sub" id="bigM3sub"></div>
      </div>
      <div class="metric-big-card">
        <div class="metric-big-label">vs anterior</div>
        <div class="metric-big-value" id="bigM4">—</div>
        <div class="metric-big-sub" id="bigM4sub"></div>
      </div>
    </div>



    <!-- Registrar peso -->
    <div class="card">
      <div class="card-title">Nuevo registro</div>
      <div class="input-section">
        <input type="date" id="dateInput" />
        <input type="number" id="weightInput" step="0.01" min="30" max="300" placeholder="kg" />
        <button onclick="addEntry()" title="Guardar">💾</button>
      </div>
      <textarea class="textarea" id="noteInput" placeholder="Nota (opcional)..."></textarea>
    </div>

    <!-- Período de referencia -->
    <div class="card">
      <div class="card-title">Período de referencia</div>
      <div class="input-section" style="margin-bottom: 0;">
        <input type="date" id="startDateInput" oninput="savePreferences()" />
      </div>
      <div class="metric-label-big" id="startInfo" style="margin-top: 8px; text-align: left;">—</div>
    </div>

    <!-- Gráfico -->
    <div class="card">
      <div class="card-title">Evolución gráfica</div>
      <div class="tabs" id="chartControls">
        <button class="tab-btn active" onclick="setChartMode('week')">Semana</button>
        <button class="tab-btn" onclick="setChartMode('month')">Mes</button>
        <button class="tab-btn" onclick="setChartMode('year')">Año</button>
        <button class="tab-btn" onclick="setChartMode('all')">Todo</button>
        <button class="tab-btn" onclick="setChartMode('custom')">Custom</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- Resumen de cambios -->
    <div class="card" id="evolutionCard" style="display:none;">
      <div class="card-title">Resumen de cambios</div>
      <div id="evolutionList"></div>
      <div class="pagination" id="evolutionPagination"></div>
    </div>

    <!-- Historial -->
    <div class="card" id="logArea">
      <div class="card-title">Historial</div>
      <div id="weekList" class="empty">Sin datos</div>
      <div class="pagination" id="historyPagination"></div>
    </div>
  </div>
</div>

<script>
let entries = [];
let chartInstance = null;
let chartMode = 'week';
let darkMode = localStorage.getItem('darkMode') === 'true';
let evolutionPage = 1;
let historyPage = 1;
const ITEMS_PER_PAGE = 10;

function formatDecimal(value) {
  return (Math.round(value * 100) / 100).toFixed(2);
}

function toggleTheme() {
  darkMode = !darkMode;
  localStorage.setItem('darkMode', darkMode);
  updateTheme();
}

function updateTheme() {
  if (darkMode) {
    document.body.classList.add('dark-mode');
    document.getElementById('themeIcon').textContent = '◑';
  } else {
    document.body.classList.remove('dark-mode');
    document.getElementById('themeIcon').textContent = '◐';
  }
}

function toggleMenu() {
  document.getElementById('menu').classList.toggle('active');
}

function closeMenu() {
  document.getElementById('menu').classList.remove('active');
}

document.addEventListener('click', function(event) {
  const menu = document.getElementById('menu');
  const menuBtn = document.querySelector('.menu-btn');
  if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
    menu.classList.remove('active');
  }
});

function savePreferences() {
  localStorage.setItem('chartMode', chartMode);
  localStorage.setItem('startDate', document.getElementById('startDateInput').value);
}

function loadData() {
  const saved = localStorage.getItem('weightEntries');
  const savedStartDate = localStorage.getItem('startDate');
  const savedChartMode = localStorage.getItem('chartMode');
  const savedDarkMode = localStorage.getItem('darkMode');
  
  if (saved) {
    try {
      entries = JSON.parse(saved);
    } catch (e) {
      entries = [];
    }
  }
  if (savedStartDate) {
    document.getElementById('startDateInput').value = savedStartDate;
  }
  if (savedChartMode) {
    chartMode = savedChartMode;
  }
  updateTheme();
  render();
  // Actualizar tab activo después de render
  setTimeout(() => {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[onclick="setChartMode('${chartMode}')"]`)?.classList.add('active');
  }, 0);
}

function saveData() {
  localStorage.setItem('weightEntries', JSON.stringify(entries));
  savePreferences();
}

function showAlert(msg, type = 'success') {
  const container = document.getElementById('alerts');
  const alert = document.createElement('div');
  alert.className = `alert ${type}`;
  alert.textContent = msg;
  container.innerHTML = '';
  container.appendChild(alert);
  setTimeout(() => alert.remove(), 4000);
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function convertFechaToISO(dateStr) {
  const [d, m, y] = dateStr.split('/');
  return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
}

function convertFechaToDDMMYYYY(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function importCSV() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.trim().split('\n');
      let imported = 0;
      const newEntries = [];
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const parts = line.split(',').map(p => p.trim());
        if (parts.length < 2) continue;
        const fechaStr = parts[0];
        const pesoStr = parts[1];
        let date = fechaStr.includes('/') ? convertFechaToISO(fechaStr) : fechaStr;
        const peso = parseFloat(pesoStr);
        if (!date || isNaN(peso)) continue;
        newEntries.push({ date, weight: peso });
        imported++;
      }
      
      const existingDates = new Set(entries.map(e => e.date));
      newEntries.forEach(ne => {
        if (!existingDates.has(ne.date)) {
          entries.push(ne);
        }
      });
      
      entries.sort((a, b) => a.date.localeCompare(b.date));
      saveData();
      resetPagination();
      render();
      showAlert(`Importados ${imported} registros`, 'success');
      document.getElementById('csvFile').value = '';
    } catch (err) {
      showAlert('Error al importar', 'error');
    }
  };
  reader.readAsText(file);
}

function exportCSV() {
  if (entries.length === 0) {
    showAlert('Sin datos', 'error');
    return;
  }
  let csv = 'fecha,peso\n';
  entries.forEach(e => {
    csv += `${convertFechaToDDMMYYYY(e.date)},${formatDecimal(e.weight)}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `peso-${todayStr()}.csv`;
  a.click();
  window.URL.revokeObjectURL(url);
  showAlert('CSV exportado', 'success');
}

function confirmarLimpiarDatos() {
  if (!confirm('⚠️ Esto eliminará TODOS los datos. ¿Estás seguro?')) return;
  if (!confirm('❌ Última confirmación. Todos los registros se perderán. ¿Continuar?')) return;
  limpiarDatos();
}

function limpiarDatos() {
  entries = [];
  saveData();
  resetPagination();
  render();
  showAlert('✓ Todos los datos han sido eliminados', 'success');
}

function addEntry() {
  const date = document.getElementById('dateInput').value;
  const weight = parseFloat(document.getElementById('weightInput').value);
  const note = document.getElementById('noteInput').value.trim();
  
  if (!date || isNaN(weight) || weight < 30 || weight > 300) {
    showAlert('Fecha y peso válidos', 'error');
    return;
  }
  
  entries = entries.filter(e => e.date !== date);
  entries.push({ date, weight, note: note || null });
  entries.sort((a, b) => a.date.localeCompare(b.date));
  
  saveData();
  document.getElementById('weightInput').value = '';
  document.getElementById('noteInput').value = '';
  document.getElementById('dateInput').value = todayStr();
  resetPagination();
  render();
  showAlert('✓ Guardado', 'success');
}

function delEntry(date) {
  if (!confirm('¿Eliminar este registro?')) return;
  entries = entries.filter(e => e.date !== date);
  saveData();
  resetPagination();
  render();
  showAlert('Eliminado', 'success');
}

function resetPagination() {
  evolutionPage = 1;
  historyPage = 1;
}

function setChartMode(mode) {
  chartMode = mode;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  savePreferences();
  resetPagination();
  render();
}

function setEvolutionPage(page) {
  evolutionPage = page;
  render();
}

function setHistoryPage(page) {
  historyPage = page;
  render();
}

function getMondayOf(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const date = new Date(y + '-' + m + '-' + d + 'T12:00:00Z');
  const day = date.getUTCDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setUTCDate(date.getUTCDate() + diff);
  return date.toISOString().slice(0, 10);
}

function formatDate(str) {
  const [y, m, d] = str.split('-');
  const yy = y.slice(-2);
  return `${d}/${m}/${yy}`;
}

function weekLabel(monday) {
  const [y, m, d] = monday.split('-');
  const mon = new Date(y + '-' + m + '-' + d + 'T12:00:00Z');
  const sun = new Date(mon);
  sun.setUTCDate(sun.getUTCDate() + 6);
  const sunStr = sun.toISOString().slice(0, 10);
  return `${formatDate(monday)} - ${formatDate(sunStr)}`;
}

function groupByWeek(data) {
  const weeks = {};
  data.forEach(e => {
    const mon = getMondayOf(e.date);
    if (!weeks[mon]) weeks[mon] = [];
    weeks[mon].push(e);
  });
  return weeks;
}

function avg(arr) {
  if (arr.length === 0) return 0;
  return arr.reduce((s, e) => s + e.weight, 0) / arr.length;
}

function getFilteredEntries() {
  const startDate = document.getElementById('startDateInput').value;
  const now = new Date();
  let filtered = entries;
  
  if (chartMode === 'week') {
    const weekAgo = new Date(now);
    weekAgo.setDate(weekAgo.getDate() - 7);
    filtered = entries.filter(e => new Date(e.date) >= weekAgo);
  } else if (chartMode === 'month') {
    const monthAgo = new Date(now);
    monthAgo.setMonth(monthAgo.getMonth() - 1);
    filtered = entries.filter(e => new Date(e.date) >= monthAgo);
  } else if (chartMode === 'year') {
    const yearAgo = new Date(now);
    yearAgo.setFullYear(yearAgo.getFullYear() - 1);
    filtered = entries.filter(e => new Date(e.date) >= yearAgo);
  } else if (chartMode === 'custom' && startDate) {
    filtered = entries.filter(e => e.date >= startDate);
  }
  
  return filtered;
}

function createPagination(totalItems, currentPage, callback) {
  const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
  if (totalPages <= 1) return '';
  
  let html = '';
  html += `<button onclick="${callback}(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀</button>`;
  
  let start = Math.max(1, currentPage - 2);
  let end = Math.min(totalPages, currentPage + 2);
  
  if (start > 1) {
    html += `<button onclick="${callback}(1)">1</button>`;
    if (start > 2) html += '<span>...</span>';
  }
  
  for (let i = start; i <= end; i++) {
    html += `<button onclick="${callback}(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
  }
  
  if (end < totalPages) {
    if (end < totalPages - 1) html += '<span>...</span>';
    html += `<button onclick="${callback}(${totalPages})">${totalPages}</button>`;
  }
  
  html += `<button onclick="${callback}(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>`;
  
  return html;
}

function render() {
  const weeks = groupByWeek(entries);
  const weekKeys = Object.keys(weeks).sort();
  const startDate = document.getElementById('startDateInput').value;
  const now = todayStr();
  const thisWeekMon = getMondayOf(now);
  const lastWeekMon = (() => {
    const [y, m, d] = thisWeekMon.split('-');
    const date = new Date(y + '-' + m + '-' + d + 'T12:00:00Z');
    date.setUTCDate(date.getUTCDate() - 7);
    return date.toISOString().slice(0, 10);
  })();

  const thisWeekAvg = weeks[thisWeekMon] ? avg(weeks[thisWeekMon]) : null;
  const lastWeekAvg = weeks[lastWeekMon] ? avg(weeks[lastWeekMon]) : null;
  const lastEntry = entries.length ? entries[entries.length - 1] : null;

  // Mínimo del período seleccionado
  const filteredForMinmax = getFilteredEntries();
  let minEntry = null;
  
  if (filteredForMinmax.length > 0) {
    minEntry = filteredForMinmax.reduce((min, e) => e.weight < min.weight ? e : min);
  }

  // Métricas grandes
  document.getElementById('bigM1').textContent = thisWeekAvg !== null ? formatDecimal(thisWeekAvg) : '—';
  
  document.getElementById('bigM2').textContent = lastEntry ? formatDecimal(lastEntry.weight) : '—';
  document.getElementById('bigM2sub').textContent = lastEntry ? formatDate(lastEntry.date) : '';
  // Color al último peso
  if (lastEntry && lastWeekAvg !== null) {
    const diff = lastEntry.weight - lastWeekAvg;
    document.getElementById('bigM2').className = 'metric-big-value ' + (Math.abs(diff) > 0.05 ? (diff > 0 ? 'up' : 'down') : '');
  }
  
  document.getElementById('bigM3').textContent = minEntry ? formatDecimal(minEntry.weight) : '—';
  document.getElementById('bigM3sub').textContent = minEntry ? formatDate(minEntry.date) : '';
  
  // vs anterior
  if (thisWeekAvg !== null && lastWeekAvg !== null) {
    const diff = thisWeekAvg - lastWeekAvg;
    document.getElementById('bigM4').textContent = (diff >= 0 ? '+' : '') + formatDecimal(diff);
    document.getElementById('bigM4').className = 'metric-big-value ' + (Math.abs(diff) > 0.05 ? (diff > 0 ? 'up' : 'down') : '');
    document.getElementById('bigM4sub').textContent = 'vs semana pasada';
  } else {
    document.getElementById('bigM4').textContent = '—';
  }

  let refEntry = null;
  if (startDate && entries.length) {
    refEntry = entries.find(e => e.date >= startDate);
  } else if (entries.length) {
    refEntry = entries[0];
  }

  if (refEntry) {
    document.getElementById('startInfo').textContent = 'Desde ' + formatDate(refEntry.date) + ' (' + formatDecimal(refEntry.weight) + ' kg)';
  }

  if (refEntry && lastEntry && refEntry.date !== lastEntry.date) {
    const total = lastEntry.weight - refEntry.weight;
    const days = Math.floor((new Date(lastEntry.date) - new Date(refEntry.date)) / (1000 * 60 * 60 * 24));
  }

  const filteredEntries = getFilteredEntries();
  const filteredWeeks = groupByWeek(filteredEntries);
  const filteredWeekKeys = Object.keys(filteredWeeks).sort();

  const evolutionCard = document.getElementById('evolutionCard');
  const evolutionList = document.getElementById('evolutionList');
  
  if (filteredWeekKeys.length > 1) {
    evolutionCard.style.display = 'block';
    evolutionList.innerHTML = '';
    
    const evolutionData = [];
    for (let i = filteredWeekKeys.length - 1; i > 0; i--) {
      const currentWeek = filteredWeekKeys[i];
      const previousWeek = filteredWeekKeys[i - 1];
      const currAvg = avg(filteredWeeks[currentWeek]);
      const prevAvg = avg(filteredWeeks[previousWeek]);
      const diff = currAvg - prevAvg;
      evolutionData.push({ currentWeek, diff, media: currAvg });
    }
    
    const startIdx = (evolutionPage - 1) * ITEMS_PER_PAGE;
    const endIdx = startIdx + ITEMS_PER_PAGE;
    const pageData = evolutionData.slice(startIdx, endIdx);
    
    pageData.forEach(item => {
      const cls = Math.abs(item.diff) > 0.05 ? (item.diff > 0 ? 'up' : 'down') : '';
      const itemEl = document.createElement('div');
      itemEl.className = 'list-item';
      itemEl.innerHTML = `<div class="list-item-primary ${cls}"><span>${formatDate(item.currentWeek)}</span><span style="display: flex; align-items: center; gap: 8px;"><span>${item.diff >= 0 ? '+' : ''}${formatDecimal(item.diff)} kg</span><span style="font-size: 11px; color: #8a8a8e;">Ø ${formatDecimal(item.media)}</span></span></div>`;
      evolutionList.appendChild(itemEl);
    });
    
    document.getElementById('evolutionPagination').innerHTML = createPagination(evolutionData.length, evolutionPage, 'setEvolutionPage');
  } else {
    evolutionCard.style.display = 'none';
  }

  const chartLabels = filteredWeekKeys.map(mon => formatDate(mon));
  const chartData = filteredWeekKeys.map(mon => parseFloat(formatDecimal(avg(filteredWeeks[mon]))));

  if (chartInstance) { chartInstance.destroy(); }
  if (chartData.length > 0) {
    const ctx = document.getElementById('chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [{
          label: 'Media semanal',
          data: chartData,
          borderColor: '#0071e3',
          backgroundColor: 'rgba(0, 113, 227, 0.08)',
          borderWidth: 2.5,
          pointRadius: 5,
          pointBackgroundColor: '#0071e3',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            ticks: { callback: v => v.toFixed(1) + ' kg', color: '#8a8a8e', font: { size: 12 } },
            grid: { color: 'rgba(0, 0, 0, 0.06)' },
            border: { display: false }
          },
          x: { 
            ticks: { color: '#8a8a8e', font: { size: 12 } },
            grid: { display: false },
            border: { display: false }
          }
        }
      }
    });
  }

  const listEl = document.getElementById('weekList');
  const displayWeeks = filteredWeekKeys.length > 0 ? filteredWeekKeys : weekKeys;
  
  if (displayWeeks.length === 0) {
    listEl.innerHTML = '<div class="empty">Sin datos</div>';
    document.getElementById('historyPagination').innerHTML = '';
  } else {
    const dayNames = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
    const startIdx = (historyPage - 1) * ITEMS_PER_PAGE;
    const endIdx = startIdx + ITEMS_PER_PAGE;
    const weeksToDisplay = [...displayWeeks].reverse().slice(startIdx, endIdx);
    
    let html = '';
    weeksToDisplay.forEach((mon) => {
      const wAvg = avg(weeks[mon]);
      html += `<div style="margin-bottom: 14px;">
        <div class="week-title">
          <span>${weekLabel(mon)}</span>
          <span>Ø ${formatDecimal(wAvg)} kg</span>
        </div>`;
      for (let i = 0; i < 7; i++) {
        const [y, m, d] = mon.split('-');
        const date = new Date(y + '-' + m + '-' + d + 'T12:00:00Z');
        date.setUTCDate(date.getUTCDate() + i);
        const ds = date.toISOString().slice(0, 10);
        const entry = (weeks[mon] || []).find(e => e.date === ds);
        let colorClass = '';
        if (entry && Math.abs(entry.weight - wAvg) > 0.05) {
          colorClass = entry.weight > wAvg ? 'up' : 'down';
        }
        html += `<div class="list-item">
          <div class="list-item-primary">
            <span>${dayNames[i]} ${formatDate(ds)}</span>
            <div style="display: flex; align-items: center; gap: 8px;">
              <span class="${colorClass}">${entry ? formatDecimal(entry.weight) + ' kg' : '—'}</span>
              ${entry ? '<button class="del-btn" onclick="delEntry(\'' + entry.date + '\')">×</button>' : ''}
            </div>
          </div>
          ${entry && entry.note ? '<div class="day-note">// ' + entry.note + '</div>' : ''}
        </div>`;
      }
      html += '</div>';
    });
    listEl.innerHTML = html;
    
    document.getElementById('historyPagination').innerHTML = createPagination(displayWeeks.length, historyPage, 'setHistoryPage');
  }
  
  // Actualizar tab activo
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`[onclick="setChartMode('${chartMode}')"]`)?.classList.add('active');
}

document.getElementById('dateInput').value = todayStr();
loadData();
</script>
